<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷蔵庫ちゃん - AI レシピアシスタント</title>
    <meta name="description" content="食材を入力するだけで、AIが完璧なレシピを提案。可愛い冷蔵庫キャラがサポート！">
    <meta property="og:title" content="冷蔵庫ちゃん - AI レシピアシスタント">
    <meta property="og:description" content="食材を入力するだけで、AIが完璧なレシピを提案します">
    <meta property="og:type" content="website">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', 'Yu Gothic Medium', 'ヒラギノ角ゴ Pro', sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #e8f4f8 50%, #fff0e6 100%);
            min-height: 100vh;
            padding: 20px;
            color: #4a5568;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .character-wrapper {
            position: relative;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .fridge-character {
            width: 200px;
            height: 300px;
            animation: bounce 2.5s ease-in-out infinite;
            filter: drop-shadow(0 10px 25px rgba(0, 0, 0, 0.1));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b9d 0%, #f06292 50%, #ffa726 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #a0aec0;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin-bottom: 30px;
        }

        .input-section {
            background: white;
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            animation: fadeInUp 0.8s ease-out 0.1s both;
            border: 2px solid rgba(255, 107, 157, 0.1);
        }

        .input-section h2 {
            color: #ff6b9d;
            font-size: 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #f0e6ff;
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #fafbff;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ff6b9d;
            background: white;
            box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.1);
        }

        .input-group input::placeholder {
            color: #cbd5e0;
        }

        .ingredients-list {
            background: linear-gradient(135deg, #fff5f9 0%, #f0f9ff 100%);
            border-radius: 14px;
            padding: 18px;
            margin-top: 16px;
            max-height: 220px;
            overflow-y: auto;
            border: 2px dashed #ffc0e0;
            min-height: 80px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 8px;
        }

        .ingredients-list::-webkit-scrollbar {
            width: 8px;
        }

        .ingredients-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .ingredients-list::-webkit-scrollbar-thumb {
            background: #ffb3d9;
            border-radius: 4px;
        }

        .empty-state {
            color: #cbd5e0;
            font-size: 13px;
            width: 100%;
            text-align: center;
            padding-top: 30px;
        }

        .ingredient-tag {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b9d 0%, #f06292 100%);
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);
            white-space: nowrap;
        }

        .ingredient-tag:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 16px rgba(255, 107, 157, 0.4);
        }

        .ingredient-tag::after {
            content: ' ✕';
            margin-left: 6px;
            font-weight: 800;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-generate {
            background: linear-gradient(135deg, #ff6b9d 0%, #f06292 100%);
            color: white;
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.3);
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 9px 28px rgba(255, 107, 157, 0.4);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #f0e6ff;
            color: #ff6b9d;
            font-weight: 700;
            border: 2px solid #f0e6ff;
        }

        .btn-clear:hover {
            background: #e8d5ff;
            transform: translateY(-2px);
        }

        .recipe-section {
            background: white;
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            animation: fadeInUp 0.8s ease-out 0.2s both;
            min-height: 600px;
            overflow-y: auto;
            max-height: 800px;
            border: 2px solid rgba(135, 206, 235, 0.1);
        }

        .recipe-section::-webkit-scrollbar {
            width: 8px;
        }

        .recipe-section::-webkit-scrollbar-track {
            background: transparent;
        }

        .recipe-section::-webkit-scrollbar-thumb {
            background: #b3e5fc;
            border-radius: 4px;
        }

        .recipe-section h2 {
            color: #4caf50;
            font-size: 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 380px;
            gap: 24px;
        }

        .spinner {
            width: 55px;
            height: 55px;
            border: 4px solid #e8f4f8;
            border-top-color: #ff6b9d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #ff6b9d;
            font-weight: 700;
            font-size: 16px;
        }

        .recipe-content {
            display: none;
        }

        .recipe-content.show {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        .recipe-image-container {
            width: 100%;
            height: 300px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            background: linear-gradient(135deg, #fff5f9 0%, #f0f9ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 107, 157, 0.1);
        }

        .recipe-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .recipe-title {
            font-size: 28px;
            color: #2d3748;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .recipe-info {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .info-item {
            background: linear-gradient(135deg, #fff5f9 0%, #f0f9ff 100%);
            padding: 14px 20px;
            border-radius: 12px;
            border-left: 4px solid #ff6b9d;
        }

        .info-label {
            font-size: 11px;
            color: #ff6b9d;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 17px;
            color: #2d3748;
            font-weight: 800;
            margin-top: 5px;
        }

        .recipe-section-title {
            font-size: 16px;
            color: #ff6b9d;
            margin-top: 28px;
            margin-bottom: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ingredients-display {
            list-style: none;
        }

        .ingredients-display li {
            padding: 11px 0;
            border-bottom: 1px solid #f0e6ff;
            color: #4a5568;
            line-height: 1.7;
            font-size: 15px;
        }

        .ingredients-display li:last-child {
            border-bottom: none;
        }

        .ingredients-display li::before {
            content: '✨ ';
            margin-right: 10px;
            font-size: 16px;
        }

        .instructions {
            list-style: none;
        }

        .instructions li {
            padding: 18px;
            margin-bottom: 14px;
            background: linear-gradient(135deg, #fff5f9 0%, #f0f9ff 100%);
            border-radius: 12px;
            border-left: 4px solid #ff6b9d;
            color: #2d3748;
            line-height: 1.8;
            font-size: 15px;
        }

        .instructions li::before {
            content: counter(step);
            counter-increment: step;
            display: inline-block;
            background: linear-gradient(135deg, #ff6b9d 0%, #f06292 100%);
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            text-align: center;
            line-height: 34px;
            margin-right: 12px;
            font-weight: 800;
            font-size: 15px;
            box-shadow: 0 4px 10px rgba(255, 107, 157, 0.3);
        }

        .error-message {
            background: linear-gradient(135deg, #ffe8ec 0%, #ffd1dc 100%);
            color: #d81b60;
            padding: 16px;
            border-radius: 12px;
            border-left: 4px solid #d81b60;
            margin-top: 22px;
            display: none;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(216, 27, 96, 0.2);
        }

        .error-message.show {
            display: block;
        }

        .tips {
            background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
            padding: 18px;
            border-radius: 12px;
            border-left: 4px solid #4caf50;
            margin-top: 22px;
            color: #2e7d32;
            font-size: 14px;
            line-height: 1.8;
            font-weight: 500;
        }

        .tips strong {
            font-weight: 800;
            display: block;
            margin-bottom: 8px;
            color: #4caf50;
        }

        #emptyState {
            text-align: center;
            color: #cbd5e0;
            padding: 70px 20px;
            font-size: 16px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 36px;
            }

            .character-wrapper {
                height: 250px;
            }

            .fridge-character {
                width: 160px;
                height: 240px;
            }

            .recipe-section {
                min-height: auto;
                max-height: none;
            }

            .recipe-image-container {
                height: 250px;
            }

            .input-section,
            .recipe-section {
                padding: 24px;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        ol {
            counter-reset: step;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: #cbd5e0;
            font-size: 13px;
            border-top: 1px solid rgba(255, 107, 157, 0.1);
            margin-top: 60px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .footer-links a {
            color: #ff6b9d;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .footer-links a:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="character-wrapper">
                <!-- 可愛い冷蔵庫キャラ -->
                <svg class="fridge-character" viewBox="0 0 180 280" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="fridgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#fff9f5;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#fff0f5;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    
                    <!-- 本体 -->
                    <rect x="20" y="30" width="140" height="210" rx="20" fill="url(#fridgeGradient)" stroke="#ffc0e0" stroke-width="2"/>
                    
                    <!-- ドアライン -->
                    <line x1="90" y1="30" x2="90" y2="240" stroke="#ffc0e0" stroke-width="2" stroke-dasharray="8,4"/>
                    
                    <!-- ハンドル（左） -->
                    <rect x="75" y="110" width="6" height="30" rx="3" fill="#ffb3d9"/>
                    
                    <!-- ハンドル（右） -->
                    <rect x="99" y="110" width="6" height="30" rx="3" fill="#ffb3d9"/>
                    
                    <!-- 冷蔵室ウィンドウ（左上） -->
                    <rect x="30" y="50" width="55" height="65" rx="12" fill="#e8f4f8" stroke="#b3e5fc" stroke-width="2"/>
                    <circle cx="42" cy="62" r="5" fill="#ffeb3b" opacity="0.8"/>
                    <circle cx="58" cy="70" r="4" fill="#ff9800" opacity="0.8"/>
                    <circle cx="72" cy="62" r="5" fill="#ff6b9d" opacity="0.8"/>
                    
                    <!-- 冷凍室ウィンドウ（左下） -->
                    <rect x="30" y="135" width="55" height="65" rx="12" fill="#f0e6ff" stroke="#e1bee7" stroke-width="2"/>
                    <circle cx="45" cy="160" r="4" fill="#b39ddb" opacity="0.8"/>
                    <circle cx="62" cy="165" r="4" fill="#b39ddb" opacity="0.8"/>
                    <circle cx="75" cy="155" r="4" fill="#b39ddb" opacity="0.8"/>
                    
                    <!-- 右側装飾 -->
                    <circle cx="115" cy="85" r="6" fill="#b3e5fc" opacity="0.6"/>
                    <circle cx="125" cy="105" r="5" fill="#b3e5fc" opacity="0.6"/>
                    <circle cx="120" cy="155" r="6" fill="#ffcccc" opacity="0.6"/>
                    
                    <!-- 足 -->
                    <ellipse cx="50" cy="250" rx="14" ry="12" fill="#ffb3d9"/>
                    <ellipse cx="110" cy="250" rx="14" ry="12" fill="#ffb3d9"/>
                    
                    <!-- 目（大きくて可愛い） -->
                    <circle cx="55" cy="260" r="9" fill="#fff"/>
                    <circle cx="55" cy="260" r="7" fill="#ff6b9d"/>
                    <circle cx="55" cy="260" r="3" fill="#000"/>
                    <circle cx="56" cy="258" r="1.5" fill="#fff"/>
                    
                    <circle cx="105" cy="260" r="9" fill="#fff"/>
                    <circle cx="105" cy="260" r="7" fill="#ff6b9d"/>
                    <circle cx="105" cy="260" r="3" fill="#000"/>
                    <circle cx="106" cy="258" r="1.5" fill="#fff"/>
                    
                    <!-- 口（笑顔） -->
                    <path d="M 70 275 Q 80 283 90 275" stroke="#ff6b9d" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    
                    <!-- ほっぺ -->
                    <circle cx="35" cy="265" r="7" fill="#ffcccc" opacity="0.5"/>
                    <circle cx="125" cy="265" r="7" fill="#ffcccc" opacity="0.5"/>
                    
                    <!-- ハート装飾 -->
                    <path d="M 80 30 L 82 25 L 84 30 Z" fill="#ff6b9d" opacity="0.7"/>
                    <path d="M 76 30 L 78 25 L 80 30 Z" fill="#ff6b9d" opacity="0.7"/>
                </svg>
            </div>

            <h1>❄️ 冷蔵庫ちゃん</h1>
            <p class="subtitle">食材を入力するだけで、AIが完璧なレシピを提案します</p>
        </header>

        <div class="main-content">
            <div class="input-section">
                <h2>🥘 食材を入力</h2>
                
                <div class="input-group">
                    <label for="ingredientInput">持っている食材を入力してください</label>
                    <input 
                        type="text" 
                        id="ingredientInput" 
                        placeholder="例：鶏肉、玉ねぎ、トマト..."
                        autocomplete="off"
                    >
                </div>

                <div class="ingredients-list" id="ingredientsList">
                    <div class="empty-state">食材を追加してください</div>
                </div>

                <div class="button-group">
                    <button class="btn-generate" id="generateBtn">レシピを生成</button>
                    <button class="btn-clear" id="clearBtn">リセット</button>
                </div>

                <div class="error-message" id="errorMessage"></div>
            </div>

            <div class="recipe-section">
                <h2>📖 レシピ</h2>
                
                <div class="loading" id="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p class="loading-text">冷蔵庫ちゃんが考え中...</p>
                </div>

                <div class="recipe-content" id="recipeContent">
                    <div id="recipeOutput"></div>
                </div>

                <div id="emptyState">
                    <p>✨ 食材を追加してレシピを生成してください ✨</p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#top">トップ</a>
            <span>•</span>
            <a href="https://anthropic.com" target="_blank">Powered by Anthropic</a>
        </div>
        <p>&copy; 2024 冷蔵庫ちゃん. All rights reserved.</p>
    </footer>

            'キャベツ': {
                title: 'キャベツの無限サラダ',
                servings: '3人分',
                cookTime: '10分',
                ingredients: [
                    'キャベツ: 1/4個',
                    'ニンニク: 1片',
                    '塩: 小さじ1',
                    'オリーブオイル: 大さじ2',
                    '黒コショウ: 少々'
                ],
                instructions: [
                    'キャベツは千切りにする',
                    'ニンニクはみじん切りにする',
                    'ボウルにキャベツを入れる',
                    'オリーブオイル、塩、ニンニク、黒コショウを加えて和える',
                    '5分置いて味を馴染ませたら完成'
                ],
                tips: 'キャベツは冷蔵庫で冷やしてから使うとシャキシャキです。'
            },
            'ベーコン': {
                title: 'ベーコンと野菜のスパゲッティ',
                servings: '2人分',
                cookTime: '20分',
                ingredients: [
                    'ベーコン: 100g',
                    'スパゲッティ: 200g',
                    'ニンニク: 1片',
                    'オリーブオイル: 大さじ2',
                    '塩・こしょう: 少々'
                ],
                instructions: [
                    'ベーコンを細切りにする',
                    'スパゲッティを塩湯で茹でる',
                    'フライパンでベーコンを炒める',
                    'ニンニクを加えて香りを出す',
                    'スパゲッティを加えてしっかり混ぜる'
                ],
                tips: 'ベーコンから出た油が調味料になるため、足し油は控えめに。'
            }
        };

        let ingredients = [];
        const ingredientInput = document.getElementById('ingredientInput');
        const ingredientsList = document.getElementById('ingredientsList');
        const generateBtn = document.getElementById('generateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const recipeContent = document.getElementById('recipeContent');
        const recipeOutput = document.getElementById('recipeOutput');
        const errorMessage = document.getElementById('errorMessage');
        const emptyState = document.getElementById('emptyState');

        // Unsplash API を使って料理画像を検索
        async function searchRecipeImage(recipeName) {
            try {
                const response = await fetch(
                    `https://api.unsplash.com/search/photos?query=${encodeURIComponent(recipeName)}&per_page=1&orientation=landscape`,
                    {
                        headers: {
                            'Accept-Version': 'v1'
                        }
                    }
                );

                if (!response.ok) {
                    console.warn('画像検索に失敗しました');
                    return null;
                }

                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    return {
                        url: data.results[0].urls.regular,
                        photographer: data.results[0].user.name
                    };
                }
                
                return null;
            } catch (error) {
                console.warn('画像取得エラー:', error);
                return null;
            }
        }

        // 食材を追加
        ingredientInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const value = ingredientInput.value.trim();
                if (value && !ingredients.includes(value)) {
                    ingredients.push(value);
                    updateIngredientsList();
                    ingredientInput.value = '';
                    ingredientInput.focus();
                }
            }
        });

        // 食材リストを更新
        function updateIngredientsList() {
            if (ingredients.length === 0) {
                ingredientsList.innerHTML = '<div class="empty-state">食材を追加してください</div>';
                return;
            }

            ingredientsList.innerHTML = ingredients
                .map((ing, idx) => `<span class="ingredient-tag" onclick="removeIngredient(${idx})">${ing}</span>`)
                .join('');
        }

        // 食材を削除
        window.removeIngredient = (idx) => {
            ingredients.splice(idx, 1);
            updateIngredientsList();
        };

        // リセット
        clearBtn.addEventListener('click', () => {
            ingredients = [];
            ingredientInput.value = '';
            updateIngredientsList();
            recipeContent.classList.remove('show');
            emptyState.style.display = 'block';
            errorMessage.classList.remove('show');
            ingredientInput.focus();
        });

        // レシピを生成（サンプルレシピから選択）
        generateBtn.addEventListener('click', async () => {
            if (ingredients.length === 0) {
                showError('⚠️ 食材を1つ以上追加してください');
                return;
            }

            errorMessage.classList.remove('show');
            loading.style.display = 'flex';
            recipeContent.classList.remove('show');
            emptyState.style.display = 'none';

            // 遅延を模擬する（AIが考えている感じ）
            await new Promise(resolve => setTimeout(resolve, 2000));

            try {
                // 食材に基づいてレシピを選択
                let selectedRecipe = null;
                for (const ing of ingredients) {
                    if (sampleRecipes[ing]) {
                        selectedRecipe = sampleRecipes[ing];
                        break;
                    }
                }

                // マッチするレシピがない場合はランダムに選択
                if (!selectedRecipe) {
                    const keys = Object.keys(sampleRecipes);
                    selectedRecipe = sampleRecipes[keys[Math.floor(Math.random() * keys.length)]];
                }

                // レシピ画像を検索
                const imageData = await searchRecipeImage(selectedRecipe.title);

                displayRecipe(selectedRecipe, imageData);

            } catch (error) {
                console.error('Error:', error);
                showError('⚠️ レシピの生成に失敗しました。もう一度試してください');
            } finally {
                loading.style.display = 'none';
            }
        });

        // レシピを表示
        function displayRecipe(recipe, imageData) {
            let imageHTML = '';
            
            if (imageData && imageData.url) {
                imageHTML = `
                    <div class="recipe-image-container">
                        <img src="${imageData.url}" alt="${recipe.title}" loading="lazy">
                    </div>
                `;
            }

            const html = `
                ${imageHTML}
                
                <div class="recipe-title">🍽️ ${recipe.title || 'レシピ'}</div>
                
                <div class="recipe-info">
                    <div class="info-item">
                        <div class="info-label">人数</div>
                        <div class="info-value">${recipe.servings || '4人分'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">調理時間</div>
                        <div class="info-value">${recipe.cookTime || '30分'}</div>
                    </div>
                </div>

                <div class="recipe-section-title">📋 材料</div>
                <ul class="ingredients-display">
                    ${(recipe.ingredients || []).map(ing => `<li>${ing}</li>`).join('')}
                </ul>

                <div class="recipe-section-title">👨‍🍳 作り方</div>
                <ol class="instructions">
                    ${(recipe.instructions || []).map(inst => `<li>${inst}</li>`).join('')}
                </ol>

                ${recipe.tips ? `
                    <div class="tips">
                        <strong>💡 冷蔵庫ちゃんのコツ</strong>
                        ${recipe.tips}
                    </div>
                ` : ''}
            `;

            recipeOutput.innerHTML = html;
            recipeContent.classList.add('show');
        }

        // エラーを表示
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        // 初期状態
        updateIngredientsList();
        ingredientInput.focus();
    </script>
</body>
</html>
