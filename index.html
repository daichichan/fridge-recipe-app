<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷蔵庫ちゃん - AI レシピアシスタント</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Yu Gothic Medium', sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #e8f4f8 50%, #fff0e6 100%);
            min-height: 100vh;
            padding: 20px;
            color: #4a5568;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b9d 0%, #f06292 50%, #ffa726 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #a0aec0;
            font-size: 16px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin-bottom: 30px;
        }

        .input-section {
            background: white;
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            border: 2px solid rgba(255, 107, 157, 0.1);
        }

        .input-section h2 {
            color: #ff6b9d;
            font-size: 24px;
            margin-bottom: 24px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #f0e6ff;
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fafbff;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ff6b9d;
            background: white;
            box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.1);
        }

        .ingredients-list {
            background: linear-gradient(135deg, #fff5f9 0%, #f0f9ff 100%);
            border-radius: 14px;
            padding: 18px;
            margin-top: 16px;
            max-height: 220px;
            overflow-y: auto;
            border: 2px dashed #ffc0e0;
            min-height: 80px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .empty-state {
            color: #cbd5e0;
            font-size: 13px;
            width: 100%;
            text-align: center;
            padding-top: 30px;
        }

        .ingredient-tag {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b9d 0%, #f06292 100%);
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);
        }

        .ingredient-tag:hover {
            transform: scale(1.08);
        }

        .ingredient-tag::after {
            content: ' ✕';
            margin-left: 6px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-generate {
            background: linear-gradient(135deg, #ff6b9d 0%, #f06292 100%);
            color: white;
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.3);
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-3px);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #f0e6ff;
            color: #ff6b9d;
            font-weight: 700;
        }

        .btn-clear:hover {
            background: #e8d5ff;
        }

        .recipe-section {
            background: white;
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            min-height: 600px;
            overflow-y: auto;
            max-height: 800px;
            border: 2px solid rgba(135, 206, 235, 0.1);
        }

        .recipe-section h2 {
            color: #4caf50;
            font-size: 24px;
            margin-bottom: 24px;
            font-weight: 700;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 380px;
            gap: 24px;
        }

        .spinner {
            width: 55px;
            height: 55px;
            border: 4px solid #e8f4f8;
            border-top-color: #ff6b9d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #ff6b9d;
            font-weight: 700;
            font-size: 16px;
        }

        .recipe-content {
            display: none;
        }

        .recipe-content.show {
            display: block;
        }

        .recipe-image-container {
            width: 100%;
            height: 300px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            background: linear-gradient(135deg, #fff5f9 0%, #f0f9ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .recipe-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .recipe-title {
            font-size: 28px;
            color: #2d3748;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .recipe-info {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .info-item {
            background: linear-gradient(135deg, #fff5f9 0%, #f0f9ff 100%);
            padding: 14px 20px;
            border-radius: 12px;
            border-left: 4px solid #ff6b9d;
        }

        .info-label {
            font-size: 11px;
            color: #ff6b9d;
            font-weight: 800;
        }

        .info-value {
            font-size: 17px;
            color: #2d3748;
            font-weight: 800;
            margin-top: 5px;
        }

        .recipe-section-title {
            font-size: 16px;
            color: #ff6b9d;
            margin-top: 28px;
            margin-bottom: 16px;
            font-weight: 800;
        }

        .ingredients-display {
            list-style: none;
        }

        .ingredients-display li {
            padding: 11px 0;
            border-bottom: 1px solid #f0e6ff;
            color: #4a5568;
            font-size: 15px;
        }

        .ingredients-display li:last-child {
            border-bottom: none;
        }

        .ingredients-display li::before {
            content: '✨ ';
            margin-right: 10px;
        }

        .instructions {
            list-style: none;
            counter-reset: step;
        }

        .instructions li {
            padding: 18px;
            margin-bottom: 14px;
            background: linear-gradient(135deg, #fff5f9 0%, #f0f9ff 100%);
            border-radius: 12px;
            border-left: 4px solid #ff6b9d;
            color: #2d3748;
            font-size: 15px;
        }

        .instructions li::before {
            content: counter(step);
            counter-increment: step;
            display: inline-block;
            background: linear-gradient(135deg, #ff6b9d 0%, #f06292 100%);
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            text-align: center;
            line-height: 34px;
            margin-right: 12px;
            font-weight: 800;
        }

        .error-message {
            background: linear-gradient(135deg, #ffe8ec 0%, #ffd1dc 100%);
            color: #d81b60;
            padding: 16px;
            border-radius: 12px;
            border-left: 4px solid #d81b60;
            margin-top: 22px;
            display: none;
            font-weight: 600;
        }

        .error-message.show {
            display: block;
        }

        .tips {
            background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
            padding: 18px;
            border-radius: 12px;
            border-left: 4px solid #4caf50;
            margin-top: 22px;
            color: #2e7d32;
            font-size: 14px;
        }

        #emptyState {
            text-align: center;
            color: #cbd5e0;
            padding: 70px 20px;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>❄️ 冷蔵庫ちゃん</h1>
            <p class="subtitle">食材を入力するだけで、AIが完璧なレシピを提案します</p>
        </header>

        <div class="main-content">
            <div class="input-section">
                <h2>🥘 食材を入力</h2>
                <div class="input-group">
                    <label for="ingredientInput">持っている食材を入力してください</label>
                    <input type="text" id="ingredientInput" placeholder="例：鶏肉、玉ねぎ、トマト..." autocomplete="off">
                </div>
                <div class="ingredients-list" id="ingredientsList">
                    <div class="empty-state">食材を追加してください</div>
                </div>
                <div class="button-group">
                    <button class="btn-generate" id="generateBtn">レシピを生成</button>
                    <button class="btn-clear" id="clearBtn">リセット</button>
                </div>
                <div class="error-message" id="errorMessage"></div>
            </div>

            <div class="recipe-section">
                <h2>📖 レシピ</h2>
                <div class="loading" id="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p class="loading-text">冷蔵庫ちゃんが考え中...</p>
                </div>
                <div class="recipe-content" id="recipeContent">
                    <div id="recipeOutput"></div>
                </div>
                <div id="emptyState">
                    <p>✨ 食材を追加してレシピを生成してください ✨</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ingredients = [];
        const ingredientInput = document.getElementById('ingredientInput');
        const ingredientsList = document.getElementById('ingredientsList');
        const generateBtn = document.getElementById('generateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const recipeContent = document.getElementById('recipeContent');
        const recipeOutput = document.getElementById('recipeOutput');
        const errorMessage = document.getElementById('errorMessage');
        const emptyState = document.getElementById('emptyState');

        async function searchRecipeImage(recipeName) {
            try {
                const response = await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(recipeName)}&per_page=1&orientation=landscape`, {
                    headers: {'Accept-Version': 'v1'}
                });
                if (!response.ok) return null;
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    return {url: data.results[0].urls.regular};
                }
                return null;
            } catch (error) {
                console.warn('画像取得エラー:', error);
                return null;
            }
        }

        ingredientInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const value = ingredientInput.value.trim();
                if (value && !ingredients.includes(value)) {
                    ingredients.push(value);
                    updateIngredientsList();
                    ingredientInput.value = '';
                    ingredientInput.focus();
                }
            }
        });

        function updateIngredientsList() {
            if (ingredients.length === 0) {
                ingredientsList.innerHTML = '<div class="empty-state">食材を追加してください</div>';
                return;
            }
            ingredientsList.innerHTML = ingredients.map((ing, idx) => `<span class="ingredient-tag" onclick="removeIngredient(${idx})">${ing}</span>`).join('');
        }

        window.removeIngredient = (idx) => {
            ingredients.splice(idx, 1);
            updateIngredientsList();
        };

        clearBtn.addEventListener('click', () => {
            ingredients = [];
            ingredientInput.value = '';
            updateIngredientsList();
            recipeContent.classList.remove('show');
            emptyState.style.display = 'block';
            errorMessage.classList.remove('show');
            ingredientInput.focus();
        });

        generateBtn.addEventListener('click', async () => {
            if (ingredients.length === 0) {
                showError('⚠️ 食材を1つ以上追加してください');
                return;
            }

            errorMessage.classList.remove('show');
            loading.style.display = 'flex';
            recipeContent.classList.remove('show');
            emptyState.style.display = 'none';
            generateBtn.disabled = true;

            try {
                const response = await fetch('/api/generateRecipe', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ingredients: ingredients
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to generate recipe');
                }

                const recipe = await response.json();
                const imageData = await searchRecipeImage(recipe.title);
                displayRecipe(recipe, imageData);

            } catch (error) {
                console.error('Error:', error);
                showError('⚠️ レシピの生成に失敗しました。もう一度試してください。\nエラー：' + error.message);
            } finally {
                loading.style.display = 'none';
                generateBtn.disabled = false;
            }
        });

        function displayRecipe(recipe, imageData) {
            let imageHTML = '';
            if (imageData && imageData.url) {
                imageHTML = `<div class="recipe-image-container"><img src="${imageData.url}" alt="${recipe.title}" loading="lazy"></div>`;
            }
            const html = `${imageHTML}<div class="recipe-title">🍽️ ${recipe.title || 'レシピ'}</div><div class="recipe-info"><div class="info-item"><div class="info-label">人数</div><div class="info-value">${recipe.servings || '4人分'}</div></div><div class="info-item"><div class="info-label">調理時間</div><div class="info-value">${recipe.cookTime || '30分'}</div></div></div><div class="recipe-section-title">📋 材料</div><ul class="ingredients-display">${(recipe.ingredients || []).map(ing => `<li>${ing}</li>`).join('')}</ul><div class="recipe-section-title">👨‍🍳 作り方</div><ol class="instructions">${(recipe.instructions || []).map(inst => `<li>${inst}</li>`).join('')}</ol>${recipe.tips ? `<div class="tips"><strong>💡 冷蔵庫ちゃんのコツ</strong><br>${recipe.tips}</div>` : ''}`;
            recipeOutput.innerHTML = html;
            recipeContent.classList.add('show');
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        updateIngredientsList();
        ingredientInput.focus();
    </script>
</body>
</html>
